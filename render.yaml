# render.yaml — Render Blueprint configuration
# Repo: github.com/cxzyr9hm2t-del/perfectlookbyemily
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: perfect-look-by-emily
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SQUARE_ENV
        value: production
      - key: FORMSPREE_ENDPOINT
        value: xzdjpakd
      - key: MAILCHIMP_SERVER
        value: us1
      - key: SQUARE_ACCESS_TOKEN
        sync: false
      - key: SQUARE_LOCATION_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: MAILCHIMP_API_KEY
        sync: false
      - key: MAILCHIMP_LIST_ID
        sync: false
